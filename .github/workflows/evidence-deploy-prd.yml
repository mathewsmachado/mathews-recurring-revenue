name: Evidence Deploy Production

on:
  push:
    branches:
      - main
    paths:
      - evidence/**
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  evidence-deploy-prd:
    uses: ./.github/workflows/evidence-deploy.yml
    with:
      environment: prd
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
