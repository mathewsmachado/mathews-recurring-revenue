on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

    secrets:
      VERCEL_TOKEN:
        description: Vercel Authentication Token
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: true

jobs:
  dbt-validate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT_ID }}
      GCP_CLIENT_EMAIL: ${{ vars.GCP_SERVICE_ACCOUNT_DBT_PROJECT }}

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: dbt_project

    steps:
      - name: Clone Repository
        uses: actions/checkout@v5

      - uses: ./.github/actions/dbt-gcp-setup
        with:
          gcp-project-id: ${{ vars.GCP_PROJECT_ID }}
          gcp-workload-identity-provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ vars.GCP_SERVICE_ACCOUNT_DBT_PROJECT }}
          gcp-artifacts-bucket-prd: ${{ vars.GCP_ARTIFACTS_BUCKET_PRD }}

      - name: Run Unit Tests
        run: |
          if [ ! -f artifacts/manifest.json ]; then
            uv run dbt test
          else
            uv run dbt test \
              --defer \
              --state artifacts \
              --select state:modified,test_type:unit
          fi

  dbt-run:
    needs: dbt-validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT_ID }}
      GCP_CLIENT_EMAIL: ${{ vars.GCP_SERVICE_ACCOUNT_DBT_PROJECT }}

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: dbt_project

    steps:
      - name: Clone Repository
        uses: actions/checkout@v5

      - uses: ./.github/actions/dbt-gcp-setup
        with:
          gcp-project-id: ${{ vars.GCP_PROJECT_ID }}
          gcp-workload-identity-provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ vars.GCP_SERVICE_ACCOUNT_DBT_PROJECT }}
          gcp-artifacts-bucket-prd: ${{ vars.GCP_ARTIFACTS_BUCKET_PRD }}

      - name: Run Modified Seeds
        run: |
          if [ ! -f artifacts/manifest.json ]; then
            uv run dbt seed
          else
            uv run dbt seed --defer --state artifacts --select state:modified
          fi

      - name: Run Modified Models
        run: |
          if [ ! -f artifacts/manifest.json ]; then
            uv run dbt run
          else
            uv run dbt run --defer --state artifacts --select state:modified
          fi

  dbt-docs-deploy:
    needs: dbt-run
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT_ID }}
      GCP_CLIENT_EMAIL: ${{ vars.GCP_SERVICE_ACCOUNT_DBT_PROJECT }}

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: dbt_project

    steps:
      - name: Clone Repository
        uses: actions/checkout@v5

      - uses: ./.github/actions/dbt-gcp-setup
        with:
          gcp-project-id: ${{ vars.GCP_PROJECT_ID }}
          gcp-workload-identity-provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ vars.GCP_SERVICE_ACCOUNT_DBT_PROJECT }}
          gcp-artifacts-bucket-prd: ${{ vars.GCP_ARTIFACTS_BUCKET_PRD }}

      - name: Generate Docs
        run: |
          if [ ! -f artifacts/manifest.json ]; then
            uv run dbt docs generate --static
          else
            uv run dbt docs generate \
              --static \
              --no-compile \
              --defer \
              --state artifacts \
              --select state:modified
          fi

      - name: Deploy to Vercel
        uses: ./.github/actions/vercel-deploy
        with:
          dir-path: dbt_project/target
          vercel-org-id: ${{ vars.VERCEL_ORG_ID }}
          vercel-project-id: ${{ vars.VERCEL_PROJECT_ID_DBT_DOCS }}
          vercel-project-name: ${{ vars.VERCEL_PROJECT_NAME_DBT_DOCS }}
          vercel-token: ${{ secrets.VERCEL_TOKEN }}

  dbt-project-deploy:
    needs: dbt-run
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      GCP_PROJECT: ${{ vars.GCP_PROJECT_ID }}
      GCP_CLIENT_EMAIL: ${{ vars.GCP_SERVICE_ACCOUNT_DBT_PROJECT }}

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: dbt_project

    steps:
      - name: Clone Repository
        uses: actions/checkout@v5

      - uses: ./.github/actions/gcp-authenticate
        with:
          gcp-project-id: ${{ vars.GCP_PROJECT_ID }}
          gcp-workload-identity-provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ vars.GCP_SERVICE_ACCOUNT_DBT_PROJECT }}

      - name: Get GCP access token
        id: gcp-token
        run: echo "token=$(gcloud auth print-access-token)" >> $GITHUB_OUTPUT

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-token.outputs.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker Metadata
        id: docker-metadata
        run: echo "image=us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/dbt-project/dbt-project:${{ github.event.pull_request.head.sha || github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: dbt_project
          tags: ${{ steps.docker-metadata.outputs.image }}
          cache-from: type=gha,ref=${{ steps.docker-metadata.outputs.image }}
          cache-to: type=gha,ref=${{ steps.docker-metadata.outputs.image }},mode=max
          push: true

      - name: Deploy to Cloud Run
        run: |
          DOCKER_IMAGE=${{ steps.docker-metadata.outputs.image }} \
          GCP_SERVICE_ACCOUNT=${{ vars.GCP_SERVICE_ACCOUNT_DBT_PROJECT }} \
          envsubst < job.yaml |
          gcloud run jobs replace \
          --project=${{ env.GCP_PROJECT }} \
          --region=us-central1 \
          -

      - name: Upload manifest.json
        if: vars.GCP_ARTIFACTS_BUCKET == vars.GCP_ARTIFACTS_BUCKET_PRD
        run: |
          gcloud storage cp \
            target/manifest.json \
            ${{ vars.GCP_ARTIFACTS_BUCKET }}/target
